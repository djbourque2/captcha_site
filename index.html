<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="index.js"></script>
    <title>captcha</title>
</head>
<body>
    <body>
        <div id="slot" onclick="getElementById('text-entry').style.display='flex'">
            <img id="blink" src="img/blink_gif_v2.gif" onclick="this.style.display='none'"><!--blinking image is replaced by text entry-->
            <input id="text-entry" type="password" placeholder="Enter password"><!--password entry, replaced by success or failure-->
            <div id="success"></div><!--visible when password is correct-->
            <div id="failure"></div><!--visible when password is wrong-->
        </div>
        <p>What's the password?</p>
    </body>
</body>
